{% extends 'users/userbase.html' %}
{% load static %}

{% block contents %}
<div class="container" style="min-height: calc(100vh - 120px); display:flex; align-items:center; justify-content:center; padding-top:80px; padding-bottom:80px;">
    <div class="form-card" style="max-width: 720px; width:100%;">
        <h2 class="text-center" style="margin-bottom: 24px; color:#fff;">Bone Age Prediction</h2>

        <form method="POST" action="{% url 'users:prediction' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group mb-3">
                <label class="text-white d-block mb-2">Upload Hand X-ray</label>
                <input type="file" name="image" class="form-control" required>
            </div>

            <div class="form-group mb-3">
                <label class="text-white d-block mb-2">Gender</label>
                <select class="form-control" name="gender" required>
                    <option value="">Select one</option>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>

            <div class="form-group mb-3">
                <label class="text-white d-block mb-2">Birth Date</label>
                <input type="date" class="form-control" name="birth_date" required>
            </div>

            <div class="form-group mb-4">
                <label class="text-white d-block mb-2">Study Date</label>
                <input type="date" class="form-control" name="study_date" required>
            </div>

            <div class="d-flex justify-content-center flex-wrap gap-3 mb-3">
                <button type="submit" class="btn btn-primary">Predict</button>
                <button type="reset" class="btn btn-default">Reset</button>
            </div>

            {% if messages %}
                <div class="text-center mt-3">
                    {% for message in messages %}
                        <span style="color:#ffd2d2;">{{ message }}</span><br>
                    {% endfor %}
                </div>
            {% endif %}
        </form>

        {% if result %}
            <div style="margin-top: 30px; background: rgba(255,255,255,0.96); padding: 24px; border-radius: 18px; text-align:center; color:#1b1b1b;">
                <h4>Prediction Result</h4>
                <p style="font-size: 18px; margin-top: 12px;">{{ result }}</p>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
