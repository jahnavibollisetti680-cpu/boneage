<!-- {% extends 'users/userbase.html' %} -->
{% load static %}

{% block contents %}
<div id="feature" style="background-color: transparent; min-height: 100vh;">
    <div class="container" style="background-color: transparent;">
        <div class="row">
            <div class="col-md-10 col-md-offset-1 col-sm-12 text-center feature-title">

                <h2 class="mb-4">Bone Age Prediction</h2>

                {% if not result %}
                    <!-- Prediction Form -->
                    <form method="POST" action="{% url 'users:prediction' %}" enctype="multipart/form-data" style="max-width: 600px; margin: auto; background-color: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 10px;">
                        {% csrf_token %}

                        <div class="form-group">
                            <label class="float-left">Upload Hand X-ray</label>
                            <input type="file" name="image" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label class="float-left">Gender</label>
                            <select class="form-control" name="gender" required>
                                <option value="">Select one</option>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="float-left">Birth Date (DDMMYYYY)</label>
                            <input type="text" class="form-control" name="birth_date" placeholder="e.g. 13092010" required>
                        </div>

                        <div class="form-group">
                            <label class="float-left">Study Date (DDMMYYYY)</label>
                            <input type="text" class="form-control" name="study_date" placeholder="e.g. 12042025" required>
                        </div>

                        <div class="form-group mt-4" style="display: flex; justify-content: center; gap: 20px;">
                            <button type="submit" class="btn" style="background-color: #ffd700; color: black; border-radius: 25px; padding: 10px 30px;">Predict</button>
                            <button type="reset" class="btn" style="background-color: #ffd700; color: black; border-radius: 25px; padding: 10px 30px;">Reset</button>
                        </div>

                        {% if messages %}
                            {% for message in messages %}
                                <p class="mt-3 text-success">{{ message }}</p>
                            {% endfor %}
                        {% endif %}
                    </form>
                {% endif %}

                <!-- Result and Uploaded Image (Only shown after submission) -->
                {% if result %}
                    <div style="text-align: center; margin-top: 40px; background-color: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 10px; max-width: 600px; margin-left: auto; margin-right: auto;">
                        <h3><strong>Prediction Result:</strong></h3>
                        <p style="font-size: 18px; max-width: 80%; margin: 0 auto;">{{ result }}</p>

                        <!-- {% if uploaded_file_url %}
                            <div style="margin-top: 30px;">
                                <h4>Uploaded Image:</h4>
                                <img src="{{ uploaded_file_url }}" alt="Uploaded Image"
                                     style="max-width: 400px; border: 1px solid #ccc; padding: 10px; display: block; margin: 20px auto;">
                            </div>
                        {% endif %} -->
                    </div>
                {% endif %}

            </div>
        </div>
    </div>
</div>
{% endblock %}
