{% extends 'users/userbase.html' %}
{% load static %}

{% block contents %}
<div class="container" style="min-height: calc(100vh - 120px); display:flex; align-items:center; justify-content:center; padding-top: 80px; padding-bottom: 80px;">
    <div class="form-card text-center" style="max-width: 760px;">
        <h1 style="color:#fff; margin-bottom: 20px;">Welcome to Bone Age Portal</h1>
        <p style="color: rgba(255,255,255,0.9); font-size:1.05rem; margin-bottom: 30px;">Use the buttons below to access prediction, training, and account actions on a modern dashboard.</p>
        <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:16px;">
            <a href="{% url 'users:prediction' %}" class="btn btn-primary">Prediction</a>
            <a href="{% url 'users:training' %}" class="btn btn-default">Training</a>
            <a href="{% url 'index' %}" class="btn btn-secondary">Logout</a>
        </div>
    </div>
</div>
{% endblock %}
