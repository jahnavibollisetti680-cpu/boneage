{%load static%}
<!DOCTYPE html>
<html>
<head>
    <!-- /.website title -->
    <title>BONE AGE CLASSIFICATION</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <!-- CSS Files -->
    <link href="{%static 'css/bootstrap.min.css'%}" rel="stylesheet" media="screen">
    <link href="{%static 'css/font-awesome.min.css'%}" rel="stylesheet">
    <link href="{%static 'fonts/icon-7-stroke/css/pe-icon-7-stroke.css'%}" rel="stylesheet">
    <link href="{%static 'css/animate.css'%}" rel="stylesheet" media="screen">
    <link href="{%static 'css/owl.theme.css'%}" rel="stylesheet">
    <link href="{%static 'css/owl.carousel.css'%}" rel="stylesheet">

    <!-- Embedded CSS -->
    <style>
        html, body {
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(rgba(4, 17, 34, 0.72), rgba(4, 17, 34, 0.72)),
                        url("{% static 'images/background.jpg' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Open Sans', sans-serif;
            color: #fff;
        }

        #menu {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .navbar-wrapper {
            background-color: rgba(0, 0, 0, 0.78);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .navbar-brand h2 {
            color: white;
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 0.08em;
        }

        .nav.navbar-nav li a {
            color: white;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 30px;
            margin: 5px 4px;
            background: rgba(255, 255, 255, 0.12);
            transition: all 0.25s ease;
        }

        .nav.navbar-nav li a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.26);
        }

        .content-wrapper {
            min-height: calc(100vh - 80px);
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .form-card {
            background: rgba(6, 24, 42, 0.92);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
            max-width: 680px;
            width: 100%;
            margin: 20px auto;
        }

        .form-card input.form-control,
        .form-card select.form-control,
        .form-card textarea.form-control {
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 12px;
            color: #0b1724;
        }

        .form-card .btn {
            border-radius: 32px;
            padding: 12px 34px;
            min-width: 140px;
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.16);
        }

        .table-custom {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 18px;
            overflow: hidden;
        }

        .table-custom th,
        .table-custom td {
            vertical-align: middle !important;
        }

        .status-pill {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>

    <!-- Google Fonts -->
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,600,700' rel='stylesheet' type='text/css'>
    <link href='http://fonts.googleapis.com/css?family=Alegreya+Sans:100,300,400,700' rel='stylesheet' type='text/css'>

    <!-- Font Awesome -->
    <link href="http://maxcdn.bootstrapcdn.com/font-awesome/4.2.0/css/font-awesome.min.css" rel="stylesheet">
</head>

<body data-spy="scroll" data-target="#navbar-scroll">
<div id="top"></div>

<!-- NAVIGATION -->
<div id="menu">
    <nav class="navbar-wrapper navbar-default" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-themers">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand site-name" href="#top" style="color: white;"><h2>BONE AGE CLASSIFICATION</h2></a>
            </div>

            <div id="navbar-scroll" class="collapse navbar-collapse navbar-themers navbar-right">
                <ul class="nav navbar-nav">
                    <li><a href="{%url 'index'%}">Home</a></li>
                    <li><a href="{%url 'UserLogin'%}">Users</a></li>
                    <li><a href="{%url 'AdminLogin'%}">Admin</a></li>
                    <li><a href="{%url 'UserRegister'%}">Registrations</a></li>
                </ul>
            </div>
        </div>
    </nav>
</div>

<div class="content-wrapper">
    {%block contents%}
    {%endblock%}
</div>

<!-- /.javascript files -->
<script src="{%static 'js/jquery.js'%}"></script>
<script src="{%static 'js/bootstrap.min.js'%}"></script>
<script src="{%static 'js/custom.js'%}"></script>
<script src="{%static 'js/jquery.sticky.js'%}"></script>
<script src="{%static 'js/wow.min.js'%}"></script>
<script src="{%static 'js/owl.carousel.min.js'%}"></script>
<script src="{%static 'js/ekko-lightbox-min.js'%}"></script>
<script type="text/javascript">
    $(document).delegate('*[data-toggle="lightbox"]', 'click', function (event) {
        event.preventDefault();
        $(this).ekkoLightbox();
    });
</script>
<script>
    new WOW().init();
</script>
</body>
</html>
