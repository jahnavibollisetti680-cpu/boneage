{%extends 'base.html'%}
{%load static%}
{%block contents%}

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow-x: hidden;
    }

    .banner {
        background-image: url('{% static "images/background.jpg" %}');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        color: #fff;
        display: flex;
        align-items: center;
    }

    .banner .container {
        margin: 0;
        padding: 0;
    }

    .banner .row {
        width: 100%;
        margin: 0;
    }

    .banner .col-md-6 {
        text-align: left;
        padding-left: 60px;
    }

    /* Optional future section */
    #feature {
        padding: 60px 0;
        background: #f5f5f5;
    }
</style>

<!-- Fullscreen Banner Section -->
<div class="fullscreen landing parallax banner" data-img-width="2000" data-img-height="1325" data-diff="100">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h1>BONE AGE CLASSIFICATION</h1>
                <p>An AI-powered platform for analyzing X-ray and MRI images to predict bone age,built with Python and Django for medical professionals and researchers.</p>
            </div>
        </div>
    </div>
</div>

<!-- Future Feature Section Placeholder -->
<div id="feature">
    <!-- Future content -->
</div>

{%endblock%}
